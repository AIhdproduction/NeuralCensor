<svg width="100%" viewBox="0 0 680 1230" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Common styles -->
<style>
  text { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif; }
  .title { font-size:14px; font-weight:500; }
  .sub   { font-size:12px; font-weight:400; }
  .label { font-size:12px; font-weight:400; fill:rgb(61,61,58); }
  line   { stroke:rgb(115,114,108); stroke-width:1.5; fill:none; }
</style>

<!-- START -->
<rect x="240" y="20" width="200" height="44" rx="22" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Start: launch app</text>

<line x1="340" y1="64" x2="340" y2="98" marker-end="url(#arrow)"/>

<!-- Load models -->
<rect x="190" y="98" width="300" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="340" y="116" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Load models</text>
<text x="340" y="136" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">YOLO · SAM 3 · Ollama warmup</text>

<line x1="340" y1="154" x2="340" y2="188" marker-end="url(#arrow)"/>

<!-- Select input -->
<rect x="190" y="188" width="300" height="56" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="340" y="206" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Select input &amp; output</text>
<text x="340" y="226" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(95,94,90)">Image, flat folder, or root folder (auto-detect)</text>

<line x1="340" y1="244" x2="340" y2="278" marker-end="url(#arrow)"/>

<!-- For each image -->
<rect x="190" y="278" width="300" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="340" y="300" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each image</text>

<line x1="340" y1="322" x2="340" y2="356" marker-end="url(#arrow)"/>

<!-- STEP 1: YOLO -->
<rect x="170" y="356" width="340" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="374" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 1: YOLO detection (conf ≥ 0.15)</text>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Persons, cars, trucks, buses, bikes</text>

<line x1="340" y1="412" x2="340" y2="446" marker-end="url(#arrow)"/>

<!-- Decision: Objects found? -->
<rect x="210" y="446" width="260" height="44" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="340" y="468" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">Objects detected?</text>

<!-- No → right: SAM3 text-search fallback -->
<line x1="470" y1="468" x2="590" y2="468" marker-end="url(#arrow)" stroke="rgb(115,114,108)"/>
<text x="530" y="460" text-anchor="middle" class="label">No</text>
<rect x="510" y="446" width="150" height="44" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="585" y="468" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">SAM3 text-search</text>

<!-- Yes ↓ -->
<line x1="340" y1="490" x2="340" y2="524" marker-end="url(#arrow)"/>
<text x="352" y="510" class="label">Yes</text>

<!-- STEP 2: SAM3 mask refinement -->
<rect x="170" y="524" width="340" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="542" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 2: SAM 3 mask refinement</text>
<text x="340" y="562" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Precise pixel mask per YOLO box (conf ≥ 0.15)</text>

<line x1="340" y1="580" x2="340" y2="614" marker-end="url(#arrow)"/>

<!-- STEP 3: Pixelation -->
<rect x="170" y="614" width="340" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="632" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 3: Multi-pass pixelation</text>
<text x="340" y="652" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Gaussian blur × 3 + quantization</text>

<line x1="340" y1="670" x2="340" y2="704" marker-end="url(#arrow)"/>

<!-- STEP 3b: SAM3 Safety Pass (NEW) -->
<rect x="170" y="704" width="340" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="340" y="722" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 3b: SAM 3 text-search safety pass ★</text>
<text x="340" y="742" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Scans original image for anything YOLO missed</text>

<line x1="340" y1="760" x2="340" y2="794" marker-end="url(#arrow)"/>

<!-- STEP 4: Ollama verification -->
<rect x="170" y="794" width="340" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="340" y="812" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Step 4: Ollama verification</text>
<text x="340" y="832" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">AI checks for missed objects (paranoid mode)</text>

<line x1="340" y1="850" x2="340" y2="884" marker-end="url(#arrow)"/>

<!-- Decision: Missed objects? -->
<rect x="210" y="884" width="260" height="44" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="340" y="906" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">Missed objects found?</text>

<!-- No → right → Save -->
<line x1="470" y1="906" x2="536" y2="906" marker-end="url(#arrow)" stroke="rgb(115,114,108)"/>
<text x="503" y="898" text-anchor="middle" class="label">No</text>
<rect x="536" y="884" width="114" height="44" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="593" y="906" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output</text>

<!-- Yes ↓ -->
<line x1="340" y1="928" x2="340" y2="962" marker-end="url(#arrow)"/>
<text x="352" y="948" class="label">Yes</text>

<!-- STEP 5: SAM3 3rd pass -->
<rect x="170" y="962" width="340" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="340" y="980" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 5: SAM 3 text-prompt search (3rd pass)</text>
<text x="340" y="1000" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Re-scan original, apply new masks &amp; blur</text>

<line x1="340" y1="1018" x2="340" y2="1052" marker-end="url(#arrow)"/>

<!-- Save final -->
<rect x="210" y="1052" width="260" height="56" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="340" y="1070" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output &amp; write report</text>
<text x="340" y="1090" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Anonymization_Report.txt updated</text>

<!-- Loop arrow: "Save (no branch)" → right side → up → "For each image" -->
<line x1="593" y1="928" x2="593" y2="1120" stroke="rgb(115,114,108)"/>
<line x1="593" y1="1120" x2="340" y2="1120" stroke="rgb(115,114,108)"/>
<line x1="340" y1="1120" x2="340" y2="1108" marker-end="url(#arrow)"/>

<!-- Loop arrow from final save up to "For each image" -->
<line x1="340" y1="1108" x2="340" y2="1120" stroke="rgb(115,114,108)"/>

<line x1="340" y1="1108" x2="200" y2="1108" stroke="rgb(115,114,108)"/>
<line x1="200" y1="1108" x2="200" y2="300" stroke="rgb(115,114,108)"/>
<line x1="200" y1="300" x2="190" y2="300" marker-end="url(#arrow)"/>

<text x="148" y="710" text-anchor="middle" class="label" transform="rotate(-90,148,710)">Next image →</text>

<!-- END -->
<line x1="340" y1="1108" x2="340" y2="1130" marker-end="url(#arrow)"/>
<rect x="240" y="1130" width="200" height="30" rx="15" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="340" y="1145" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Done</text>

<!-- Legend note -->
<text x="340" y="1195" text-anchor="middle" class="sub" fill="rgb(153,60,29)">★ New step — safety net between pixelation and Ollama verification</text>

</svg>