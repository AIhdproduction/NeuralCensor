<svg width="100%" viewBox="0 0 960 1580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif; }
  .title  { font-size:13px; font-weight:600; }
  .sub    { font-size:11px; font-weight:400; }
  .label  { font-size:11px; font-weight:400; fill:rgb(61,61,58); }
  .head   { font-size:14px; font-weight:700; }
  .toggle { font-size:10px; font-weight:600; fill:rgb(83,74,183); font-style:italic; }
  line    { stroke:rgb(115,114,108); stroke-width:1.5; fill:none; }
</style>

<!-- ══════════════════════ TOP: START ══════════════════════ -->
<rect x="310" y="18" width="340" height="44" rx="22" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="480" y="40" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Start: launch app</text>

<line x1="480" y1="62" x2="480" y2="96" marker-end="url(#arrow)"/>

<!-- Load models -->
<rect x="220" y="96" width="520" height="72" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="480" y="114" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Load models</text>
<text x="480" y="134" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">SAM 3 · Falcon Perception (0.6B) · Ollama warmup</text>
<text x="480" y="154" text-anchor="middle" dominant-baseline="central" class="toggle">Ollama can be toggled ON/OFF — applies to images &amp; videos</text>

<line x1="480" y1="168" x2="480" y2="202" marker-end="url(#arrow)"/>

<!-- Select input -->
<rect x="200" y="202" width="560" height="56" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="480" y="220" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Browse Input — select folder or files</text>
<text x="480" y="240" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(95,94,90)">Images, videos, flat folder, or nested subfolders — auto-detected</text>

<!-- SPLIT -->
<line x1="480" y1="258" x2="480" y2="282"/>
<line x1="480" y1="282" x2="220" y2="282"/>
<line x1="480" y1="282" x2="740" y2="282"/>
<line x1="220" y1="282" x2="220" y2="308" marker-end="url(#arrow)"/>
<line x1="740" y1="282" x2="740" y2="308" marker-end="url(#arrow)"/>

<!-- Column labels -->
<rect x="90" y="298" width="260" height="32" rx="16" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
<text x="220" y="314" text-anchor="middle" dominant-baseline="central" class="head" fill="rgb(8,80,65)">IMAGE PIPELINE</text>

<rect x="610" y="298" width="260" height="32" rx="16" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="1"/>
<text x="740" y="314" text-anchor="middle" dominant-baseline="central" class="head" fill="rgb(12,68,124)">VIDEO PIPELINE</text>

<!-- ══════════════════════ LEFT: IMAGE PIPELINE ══════════════════════ -->

<line x1="220" y1="330" x2="220" y2="358" marker-end="url(#arrow)"/>
<rect x="100" y="358" width="240" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="220" y="378" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each image</text>

<!-- Step 1: SAM3 text-search (conf 0.15) -->
<line x1="220" y1="398" x2="220" y2="426" marker-end="url(#arrow)"/>
<rect x="80" y="426" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="445" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 1 — SAM 3 text-search</text>
<text x="220" y="463" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Person, car, truck, bus, motorcycle, plate</text>
<text x="220" y="476" text-anchor="middle" dominant-baseline="central" class="toggle">conf 0.15</text>

<!-- Step 1b: Falcon Perception -->
<line x1="220" y1="482" x2="220" y2="510" marker-end="url(#arrow)"/>
<rect x="80" y="510" width="280" height="56" rx="8" fill="rgb(255,242,235)" stroke="rgb(180,90,30)" stroke-width="0.5"/>
<text x="220" y="529" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(140,60,10)">Step 1b — Falcon Perception (0.6B)</text>
<text x="220" y="547" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(180,90,30)">Additional detector — IoU-merged with SAM 3</text>
<text x="220" y="560" text-anchor="middle" dominant-baseline="central" class="toggle">catches SAM 3 blind spots · ~1 GB VRAM</text>

<!-- Step 2: Blur -->
<line x1="220" y1="566" x2="220" y2="594" marker-end="url(#arrow)"/>
<rect x="80" y="594" width="280" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="220" y="612" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 2 — Multi-pass pixelation</text>
<text x="220" y="632" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Gaussian blur × 3 + quantization</text>

<!-- Step 3: Ollama -->
<line x1="220" y1="646" x2="220" y2="674" marker-end="url(#arrow)"/>
<rect x="80" y="674" width="280" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="220" y="692" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Step 3 — Ollama verification (if enabled)</text>
<text x="220" y="712" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">Vision LLM — paranoid missed-object check</text>

<!-- Decision: missed? -->
<line x1="220" y1="726" x2="220" y2="754" marker-end="url(#arrow)"/>
<rect x="100" y="754" width="240" height="40" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="220" y="774" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">Anything missed?</text>

<!-- No → Save -->
<line x1="340" y1="774" x2="392" y2="774" marker-end="url(#arrow)" stroke="rgb(115,114,108)"/>
<text x="366" y="766" text-anchor="middle" class="label">No</text>
<rect x="392" y="754" width="120" height="40" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="452" y="774" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output</text>

<!-- Yes → SAM3 re-pass (conf 0.12) -->
<line x1="220" y1="794" x2="220" y2="822" marker-end="url(#arrow)"/>
<text x="232" y="812" class="label">Yes</text>
<rect x="80" y="822" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="841" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 4 — SAM 3 re-pass (up to 3×)</text>
<text x="220" y="859" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Lower conf (0.12) · re-scan · re-blur</text>
<text x="220" y="872" text-anchor="middle" dominant-baseline="central" class="toggle">max 3 iterations</text>

<!-- Save + report -->
<line x1="220" y1="878" x2="220" y2="906" marker-end="url(#arrow)"/>
<rect x="80" y="906" width="280" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="220" y="924" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output and write report</text>
<text x="220" y="944" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Anonymization_Report.txt updated</text>

<!-- Loop: No-save and Save+Report → For each image -->
<!-- No-save path: down from x=452,y=794 → x=520,y=794 → x=520,y=1040 → x=50,y=1040 → up to y=378 → right into box -->
<line x1="452" y1="794" x2="520" y2="794" stroke="rgb(115,114,108)"/>
<line x1="520" y1="794" x2="520" y2="1040" stroke="rgb(115,114,108)"/>
<line x1="520" y1="1040" x2="50" y2="1040" stroke="rgb(115,114,108)"/>
<line x1="50" y1="1040" x2="50" y2="378" stroke="rgb(115,114,108)"/>
<line x1="50" y1="378" x2="100" y2="378" marker-end="url(#arrow)"/>
<!-- Save+Report path: left from x=80,y=958 → x=50,y=958 (joins main loop line) -->
<line x1="80" y1="958" x2="50" y2="958" stroke="rgb(115,114,108)"/>
<text x="28" y="670" text-anchor="middle" class="label" transform="rotate(-90,28,670)">Next image</text>

<!-- ══════════════════════ RIGHT: VIDEO PIPELINE ══════════════════════ -->

<line x1="740" y1="330" x2="740" y2="358" marker-end="url(#arrow)"/>
<rect x="620" y="358" width="240" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="740" y="378" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each video</text>

<!-- Step V0: Pre-read all frames -->
<line x1="740" y1="398" x2="740" y2="426" marker-end="url(#arrow)"/>
<rect x="600" y="426" width="280" height="52" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="740" y="444" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Pre-read all frames to RAM</text>
<text x="740" y="464" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(95,94,90)">Full video loaded before processing begins</text>

<!-- Step V1: SAM3 every frame -->
<line x1="740" y1="478" x2="740" y2="506" marker-end="url(#arrow)"/>
<rect x="600" y="506" width="280" height="60" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="740" y="524" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 1 — SAM 3 on every frame</text>
<text x="740" y="543" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Person · car · truck — no frame skipping</text>
<text x="740" y="560" text-anchor="middle" dominant-baseline="central" class="toggle">conf 0.20 · Dual-GPU if available</text>

<!-- Step V2: Sequential mask-drop check -->
<line x1="740" y1="566" x2="740" y2="594" marker-end="url(#arrow)"/>
<rect x="600" y="594" width="280" height="60" rx="8" fill="rgb(255,242,235)" stroke="rgb(180,90,30)" stroke-width="0.5"/>
<text x="740" y="612" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(140,60,10)">Step 2 — Sequential mask-drop check</text>
<text x="740" y="631" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(180,90,30)">If frame loses &gt;50% mask → re-run at conf 0.12</text>
<text x="740" y="648" text-anchor="middle" dominant-baseline="central" class="toggle">prevents objects vanishing between frames</text>

<!-- Step V3: Temporal smoothing -->
<line x1="740" y1="654" x2="740" y2="682" marker-end="url(#arrow)"/>
<rect x="600" y="682" width="280" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="740" y="700" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Step 3 — Temporal smoothing</text>
<text x="740" y="719" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">Single-frame gaps filled from adjacent detection</text>
<text x="740" y="732" text-anchor="middle" dominant-baseline="central" class="toggle">max 1 frame propagation — no mask invention</text>

<!-- Step V4: Parallel blur -->
<line x1="740" y1="738" x2="740" y2="766" marker-end="url(#arrow)"/>
<rect x="600" y="766" width="280" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="740" y="784" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 4 — Parallel blur rendering</text>
<text x="740" y="804" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">All frames processed in parallel on CPU cores</text>

<!-- Step V5: Merge audio -->
<line x1="740" y1="818" x2="740" y2="846" marker-end="url(#arrow)"/>
<rect x="600" y="846" width="280" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="740" y="864" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Step 5 — Merge audio (FFmpeg)</text>
<text x="740" y="884" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Original audio track preserved · AAC encode</text>

<!-- Step V6: Ollama spot-check -->
<line x1="740" y1="898" x2="740" y2="926" marker-end="url(#arrow)"/>
<rect x="600" y="926" width="280" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="740" y="944" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Step 6 — Ollama spot-check (if enabled)</text>
<text x="740" y="963" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">10 sampled frames — Vision LLM verification</text>
<text x="740" y="976" text-anchor="middle" dominant-baseline="central" class="toggle">evenly distributed across video duration</text>

<!-- Write report -->
<line x1="740" y1="982" x2="740" y2="1010" marker-end="url(#arrow)"/>
<rect x="600" y="1010" width="280" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="740" y="1028" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Write report</text>
<text x="740" y="1048" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Anonymization_Report.txt updated</text>

<!-- More videos? -->
<line x1="740" y1="1062" x2="740" y2="1090" marker-end="url(#arrow)"/>
<rect x="620" y="1090" width="240" height="40" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="740" y="1110" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">More videos?</text>

<!-- Yes → loop back to "For each video" -->
<line x1="860" y1="1110" x2="910" y2="1110" stroke="rgb(115,114,108)"/>
<line x1="910" y1="1110" x2="910" y2="378" stroke="rgb(115,114,108)"/>
<line x1="910" y1="378" x2="860" y2="378" marker-end="url(#arrow)"/>
<text x="862" y="1102" text-anchor="middle" class="label">Yes</text>
<text x="922" y="744" text-anchor="start" class="label" transform="rotate(90,922,744)">Next video</text>

<!-- No → down to done -->
<line x1="740" y1="1130" x2="740" y2="1200" marker-end="url(#arrow)"/>
<text x="752" y="1168" class="label">No</text>

<!-- ══════════════════════ BOTTOM: DONE ══════════════════════ -->
<!-- Image pipeline end line: down from x=50,y=958 continues to y=1320 -->
<line x1="50" y1="958" x2="50" y2="1320" stroke="rgb(115,114,108)"/>
<line x1="50" y1="1320" x2="480" y2="1320" stroke="rgb(115,114,108)"/>
<line x1="740" y1="1200" x2="740" y2="1320" stroke="rgb(115,114,108)"/>
<line x1="740" y1="1320" x2="480" y2="1320" stroke="rgb(115,114,108)"/>
<line x1="480" y1="1320" x2="480" y2="1290" marker-end="url(#arrow)"/>

<rect x="360" y="1258" width="240" height="32" rx="16" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="480" y="1274" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Done — all files processed</text>

</svg>