<svg width="100%" viewBox="0 0 920 1400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif; }
  .title { font-size:13px; font-weight:600; }
  .sub   { font-size:11px; font-weight:400; }
  .label { font-size:11px; font-weight:400; fill:rgb(61,61,58); }
  .head  { font-size:14px; font-weight:700; }
  .toggle { font-size:10px; font-weight:600; fill:rgb(83,74,183); font-style:italic; }
  line   { stroke:rgb(115,114,108); stroke-width:1.5; fill:none; }
</style>

<!-- ══════════════════════════════════════════════════════ -->
<!-- TOP: START (shared)                                    -->
<!-- ══════════════════════════════════════════════════════ -->
<rect x="310" y="18" width="300" height="44" rx="22" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="460" y="40" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Start: launch app</text>

<line x1="460" y1="62" x2="460" y2="96" marker-end="url(#arrow)"/>

<!-- Load models -->
<rect x="240" y="96" width="440" height="68" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="460" y="115" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Load models</text>
<text x="460" y="135" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">SAM 3 · Ollama warmup</text>
<text x="460" y="152" text-anchor="middle" dominant-baseline="central" class="toggle">Ollama can be toggled ON/OFF — applies to images &amp; videos</text>

<line x1="460" y1="164" x2="460" y2="198" marker-end="url(#arrow)"/>

<!-- Select input -->
<rect x="220" y="198" width="480" height="56" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="460" y="216" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Browse Input — select folder or files</text>
<text x="460" y="236" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(95,94,90)">Images, videos, flat folder, or nested subfolders — auto-detected</text>

<!-- SPLIT arrow left (image) and right (video) -->
<line x1="460" y1="254" x2="460" y2="278"/>
<line x1="460" y1="278" x2="220" y2="278"/>
<line x1="460" y1="278" x2="700" y2="278"/>
<line x1="220" y1="278" x2="220" y2="304" marker-end="url(#arrow)"/>
<line x1="700" y1="278" x2="700" y2="304" marker-end="url(#arrow)"/>

<!-- Column labels -->
<rect x="100" y="294" width="240" height="32" rx="16" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
<text x="220" y="310" text-anchor="middle" dominant-baseline="central" class="head" fill="rgb(8,80,65)">IMAGE PIPELINE</text>

<rect x="580" y="294" width="240" height="32" rx="16" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="1"/>
<text x="700" y="310" text-anchor="middle" dominant-baseline="central" class="head" fill="rgb(12,68,124)">VIDEO PIPELINE</text>

<!-- ======================================================= -->
<!-- LEFT: IMAGE PIPELINE                                     -->
<!-- ======================================================= -->

<!-- For each image -->
<line x1="220" y1="326" x2="220" y2="354" marker-end="url(#arrow)"/>
<rect x="100" y="354" width="240" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="220" y="374" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each image</text>

<!-- Step 1: SAM3 text-search -->
<line x1="220" y1="394" x2="220" y2="422" marker-end="url(#arrow)"/>
<rect x="80" y="422" width="280" height="52" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="440" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 1 — SAM 3 text-search</text>
<text x="220" y="460" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Person, car, truck, bus, motorcycle, plate</text>

<!-- Step 2: Blur -->
<line x1="220" y1="474" x2="220" y2="502" marker-end="url(#arrow)"/>
<rect x="80" y="502" width="280" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="220" y="520" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 2 — Multi-pass pixelation</text>
<text x="220" y="540" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Gaussian blur x 3 + quantization</text>

<!-- Step 3: Ollama -->
<line x1="220" y1="554" x2="220" y2="582" marker-end="url(#arrow)"/>
<rect x="80" y="582" width="280" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="220" y="600" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Step 3 — Ollama verification (if enabled)</text>
<text x="220" y="620" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">Vision LLM — paranoid missed-object check</text>

<!-- Decision: missed? -->
<line x1="220" y1="634" x2="220" y2="662" marker-end="url(#arrow)"/>
<rect x="100" y="662" width="240" height="40" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="220" y="682" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">Anything missed?</text>

<!-- No: save -->
<line x1="340" y1="682" x2="390" y2="682" marker-end="url(#arrow)" stroke="rgb(115,114,108)"/>
<text x="365" y="674" text-anchor="middle" class="label">No</text>
<rect x="390" y="662" width="110" height="40" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="445" y="682" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output</text>

<!-- Yes: SAM3 re-pass -->
<line x1="220" y1="702" x2="220" y2="730" marker-end="url(#arrow)"/>
<text x="232" y="720" class="label">Yes</text>
<rect x="80" y="730" width="280" height="52" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="748" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 4 — SAM 3 re-pass (up to 3x)</text>
<text x="220" y="768" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Lower conf (0.12) - re-scan - re-blur</text>

<!-- Save + report -->
<line x1="220" y1="782" x2="220" y2="810" marker-end="url(#arrow)"/>
<rect x="90" y="810" width="260" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="220" y="828" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Save output and write report</text>
<text x="220" y="848" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Anonymization_Report.txt updated</text>

<!-- Loop: No-save box to For each image -->
<line x1="445" y1="702" x2="445" y2="904" stroke="rgb(115,114,108)"/>
<line x1="445" y1="904" x2="220" y2="904" stroke="rgb(115,114,108)"/>
<line x1="220" y1="904" x2="220" y2="874" stroke="rgb(115,114,108)"/>
<!-- Loop from bottom save -->
<line x1="220" y1="862" x2="60" y2="862" stroke="rgb(115,114,108)"/>
<line x1="60" y1="862" x2="60" y2="374" stroke="rgb(115,114,108)"/>
<line x1="60" y1="374" x2="100" y2="374" marker-end="url(#arrow)"/>
<text x="38" y="620" text-anchor="middle" class="label" transform="rotate(-90,38,620)">Next image</text>

<!-- ======================================================= -->
<!-- RIGHT: VIDEO PIPELINE                                    -->
<!-- ======================================================= -->

<!-- For each video -->
<line x1="700" y1="326" x2="700" y2="354" marker-end="url(#arrow)"/>
<rect x="580" y="354" width="240" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="700" y="374" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each video</text>

<!-- For each frame -->
<line x1="700" y1="394" x2="700" y2="422" marker-end="url(#arrow)"/>
<rect x="580" y="422" width="240" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="700" y="442" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(12,68,124)">For each frame (every frame)</text>

<!-- Step V1: SAM3 text-prompt -->
<line x1="700" y1="462" x2="700" y2="490" marker-end="url(#arrow)"/>
<rect x="560" y="490" width="280" height="52" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="700" y="508" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(113,43,19)">Step 1 — SAM 3 text-prompt</text>
<text x="700" y="528" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(153,60,29)">Person · car · truck</text>

<!-- Step V2: pixel-precise masks -->
<line x1="700" y1="542" x2="700" y2="570" marker-end="url(#arrow)"/>
<rect x="560" y="570" width="280" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="700" y="588" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 2 — Pixel-precise masks</text>
<text x="700" y="608" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">IoU dedup filter — only new regions kept</text>

<!-- Step V3: blur -->
<line x1="700" y1="622" x2="700" y2="650" marker-end="url(#arrow)"/>
<rect x="560" y="650" width="280" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="700" y="668" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(8,80,65)">Step 3 — Multi-pass pixelation</text>
<text x="700" y="688" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(15,110,86)">Gaussian blur × 3 + quantization</text>

<!-- Write frame -->
<line x1="700" y1="702" x2="700" y2="730" marker-end="url(#arrow)"/>
<rect x="580" y="730" width="240" height="40" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="700" y="750" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Write frame to output</text>

<!-- Decision: more frames? -->
<line x1="700" y1="770" x2="700" y2="798" marker-end="url(#arrow)"/>
<rect x="580" y="798" width="240" height="40" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="700" y="818" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">More frames?</text>

<!-- Yes → loop back to "For each frame" -->
<line x1="840" y1="818" x2="870" y2="818" stroke="rgb(115,114,108)"/>
<line x1="870" y1="818" x2="870" y2="442" stroke="rgb(115,114,108)"/>
<line x1="870" y1="442" x2="820" y2="442" marker-end="url(#arrow)"/>
<text x="878" y="630" text-anchor="start" class="label" transform="rotate(90,878,630)">Next frame</text>
<text x="820" y="810" text-anchor="middle" class="label">Yes</text>

<!-- No → merge audio + save -->
<line x1="700" y1="838" x2="700" y2="866" marker-end="url(#arrow)"/>
<text x="712" y="856" class="label">No</text>
<rect x="560" y="866" width="280" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="700" y="884" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Merge audio (FFmpeg) &amp; save</text>
<text x="700" y="904" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Original audio track preserved</text>

<!-- Step V-Spot: Ollama spot-check -->
<line x1="700" y1="918" x2="700" y2="946" marker-end="url(#arrow)"/>
<rect x="560" y="946" width="280" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="700" y="964" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(60,52,137)">Ollama spot-check (if enabled)</text>
<text x="700" y="984" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(83,74,183)">10 sampled frames - Vision LLM verification</text>

<!-- Write report -->
<line x1="700" y1="1002" x2="700" y2="1030" marker-end="url(#arrow)"/>
<rect x="560" y="1030" width="280" height="52" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="700" y="1048" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(39,80,10)">Write report</text>
<text x="700" y="1068" text-anchor="middle" dominant-baseline="central" class="sub" fill="rgb(59,109,17)">Anonymization_Report.txt updated</text>

<!-- More videos loop -->
<line x1="700" y1="1082" x2="700" y2="1110" marker-end="url(#arrow)"/>
<rect x="580" y="1110" width="240" height="40" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="700" y="1130" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(99,56,6)">More videos?</text>

<!-- Yes → loop back to "For each video" -->
<line x1="840" y1="1130" x2="900" y2="1130" stroke="rgb(115,114,108)"/>
<line x1="900" y1="1130" x2="900" y2="374" stroke="rgb(115,114,108)"/>
<line x1="900" y1="374" x2="820" y2="374" marker-end="url(#arrow)"/>
<text x="840" y="1122" text-anchor="middle" class="label">Yes</text>

<!-- No → done -->
<line x1="700" y1="1150" x2="700" y2="1220" marker-end="url(#arrow)"/>
<text x="712" y="1186" class="label">No</text>

<!-- ======================================================= -->
<!-- BOTTOM: DONE (shared)                                   -->
<!-- ======================================================= -->
<line x1="220" y1="862" x2="220" y2="1330"/>
<line x1="220" y1="1330" x2="460" y2="1330" stroke="rgb(115,114,108)"/>
<line x1="700" y1="1220" x2="700" y2="1330" stroke="rgb(115,114,108)"/>
<line x1="700" y1="1330" x2="460" y2="1330" stroke="rgb(115,114,108)"/>
<line x1="460" y1="1330" x2="460" y2="1300" marker-end="url(#arrow)"/>

<rect x="360" y="1268" width="200" height="32" rx="16" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="460" y="1284" text-anchor="middle" dominant-baseline="central" class="title" fill="rgb(68,68,65)">Done — all files processed</text>



</svg>